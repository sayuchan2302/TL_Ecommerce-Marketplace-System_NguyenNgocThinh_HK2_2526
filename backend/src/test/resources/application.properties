spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]
spring.datasource.url=${TEST_DB_URL:jdbc:postgresql://localhost:5432/marketplace_test_db}
spring.datasource.username=${TEST_DB_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${TEST_DB_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.initialization-fail-timeout=-1
spring.jpa.hibernate.ddl-auto=${TEST_JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

jwt.secret=${TEST_JWT_SECRET:01234567890123456789012345678901}

app.seed.enabled=${TEST_APP_SEED_ENABLED:true}
app.seed.gap.enabled=false
app.seed.gap.clean-before-import=false
app.vision.enabled=false
app.notifications.promotion.dispatcher.fixed-delay-ms=3600000
app.notifications.promotion.reminder.cron=-

logging.level.root=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.springframework=INFO
