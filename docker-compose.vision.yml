services:
  vision-engine:
    build:
      context: ./vision-engine
    container_name: marketplace-vision-engine
    env_file:
      - ./vision-engine/.env
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - vision-engine-cache:/root/.cache
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  vision-engine-cache:
